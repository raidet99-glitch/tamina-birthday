<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тамина - 1 годик</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #faf6f0; color: #5a5550; text-align: center; padding: 20px; margin: 0; }
        .container { max-width: 600px; margin: 0 auto; background: #ffffff; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0,05); }
        h1 { color: #d4a373; font-size: 2.5em; margin-bottom: 10px; }
        h2 { color: #e07a5f; }
        .form-group { margin: 20px 0; text-align: left; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        input[type="text"], select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        button { background-color: #e07a5f; color: white; padding: 14px 28px; border: none; border-radius: 25px; font-size: 18px; cursor: pointer; width: 100%; transition: background 0.3s; }
        button:hover { background-color: #c9644b; }
        .footer { margin-top: 40px; font-size: 0.9em; color: #8c857b; }
    </style>
</head>
<body>

<div class="container">
    <h1>Тамина - 1 годик</h1>
    <p>С любовью приглашаем вас на первый день рождения нашей доченьки!</p>
    <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
    
    <h3>Подтвердите, пожалуйста, свое присутствие</h3>
    
    <form id="rsvpForm">
        <div class="form-group">
            <label for="guestName">Имя и фамилия*</label>
            <input type="text" id="guestName" name="name" placeholder="Введите ваше имя" required>
        </div>
        
        <div class="form-group">
            <label for="attendance">Ваш ответ*</label>
            <select id="attendance" name="attendance" required>
                <option value="Да, с удовольствием посещу ваш праздник.">Да, с удовольствием посещу ваш праздник.</option>
                <option value="К сожалению, не получится прийти.">К сожалению, не получится прийти.</option>
            </select>
        </div>
        
        <button type="submit" id="submitBtn">Отправить</button>
    </form>
    
    <div class="footer">
        <p>Будем рады разделить этот счастливый день вместе с вами ❤️</p>
        <p>Семья Тамины</p>
    </div>
</div>

<script>
const form = document.getElementById('rsvpForm');
const btn = document.getElementById('submitBtn');

if (form) {
  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    
    btn.disabled = true;
    btn.innerText = 'Отправка...';

    // Форматируем данные как параметры формы (100% защита от CORS ошибок в Google App Script)
    const formData = new URLSearchParams();
    formData.append('name', document.getElementById('guestName').value);
    formData.append('attendance', document.getElementById('attendance').value);

    try {
      // Ваша актуальная рабочая ссылка на развертывание скрипта
      const response = await fetch('https://script.google.com/macros/s/AKfycbwF8v8f2S-D9ufLZ0EzazJ5GVybrmrFjXllzEnBVKsI6p5TX96jnm3w2_vlM6GtxQp2/exec', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: formData.toString()
      });
      
      // Скрипт Google при успешной записи всегда делает перенаправление или отдает 200 OK
      alert('Ответ успешно отправлен! Ждем вас на празднике!');
      form.reset();
    } catch (err) {
      console.error(err);
      alert('Произошла ошибка при отправке, но данные могли записаться. Проверьте таблицу.');
    } finally {
      btn.disabled = false;
      btn.innerText = 'Отправить';
    }
  });
}
</script>

</body>
</html>
